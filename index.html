// ---------- Helpers ----------
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];
const el = (tag, attrs={}, ...children) => {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'style' && typeof attrs[k] === 'object') Object.assign(e.style, attrs[k]);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === 'html') e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(c) : c);
  }
  return e;
};

// Convert "HH:MM" to absolute minutes for the festival day (00:00-09:59 = next day)
function toMin(t) {
  const [h, m] = t.split(':').map(Number);
  const minutes = h * 60 + m;
  // before 06:00 = next morning (after midnight)
  return h < 6 ? minutes + 24*60 : minutes;
}
function fmtRange(s, e) { return `${s}\n${e}`; }

// Stage / day lookups
const dayById = Object.fromEntries(DAYS.map(d => [d.id, d]));
const stageById = Object.fromEntries(STAGES.map(s => [s.id, s]));
const concertById = Object.fromEntries(CONCERTS.map(c => [c.id, c]));

// ---------- State ----------
const COLORS = ['#e63946','#f5b400','#84cc16','#06b6d4','#a855f7','#ec4899','#f97316','#22c55e','#3b82f6','#eab308'];
const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="5 12 10 17 19 8"/></svg>';

let state = {
  user: load('hf_user', { name: 'MOI', color: '#e63946' }),
  selected: new Set(load('hf_selected', [])),
  friends: load('hf_friends', []), // [{id, name, color, ids: [], visible: true}]
  view: 'lineup',
  day: pickDefaultDay(),
};

function pickDefaultDay() {
  const today = new Date();
  const yr = today.getFullYear(); const mo = today.getMonth()+1; const dd = today.getDate();
  const todayStr = `${yr}-${String(mo).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
  const match = DAYS.find(d => d.date === todayStr);
  if (match) return match.id;
  if (todayStr < '2026-06-17') return 'thu18';
  return 'sun21';
}

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save() {
  localStorage.setItem('hf_user', JSON.stringify(state.user));
  localStorage.setItem('hf_selected', JSON.stringify([...state.selected]));
  localStorage.setItem('hf_friends', JSON.stringify(state.friends));
}
function toast(msg) {
  const t = el('div', { class: 'toast' }, msg);
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ---------- Conflict detection ----------
function conflictsFor(selectedIds) {
  // Returns Set of concert IDs that overlap with another selected concert (same day)
  const conflicts = new Set();
  const byDay = {};
  for (const id of selectedIds) {
    const c = concertById[id];
    if (!c) continue;
    (byDay[c.d] = byDay[c.d] || []).push(c);
  }
  for (const day in byDay) {
    const list = byDay[day];
    for (let i = 0; i < list.length; i++) {
      for (let j = i+1; j < list.length; j++) {
        const a = list[i], b = list[j];
        const as = toMin(a.s), ae = toMin(a.e);
        const bs = toMin(b.s), be = toMin(b.e);
        if (as < be && bs < ae) {
          conflicts.add(a.id);
          conflicts.add(b.id);
        }
      }
    }
  }
  return conflicts;
}

// ---------- Rendering ----------
function renderDays() {
  const root = $('#days');
  root.innerHTML = '';
  for (const d of DAYS) {
    const count = [...state.selected].filter(id => concertById[id]?.d === d.id).length;
    const tab = el('button', {
      class: 'day-tab' + (d.id === state.day ? ' active' : ''),
      onClick: () => { state.day = d.id; render(); }
    }, d.label);
    if (count > 0) tab.appendChild(el('span', { class: 'badge' }, String(count)));
    root.appendChild(tab);
  }
}

function renderStats() {
  const total = state.selected.size;
  const conflicts = conflictsFor(state.selected).size / 2; // pairs
  $('#stats').innerHTML = '';
  $('#stats').appendChild(el('span', {}, ''));
  const s1 = el('span', {}, ` ${total} `);
  const s2 = el('span', { class: 'count' }, String(total));
  $('#stats').appendChild(s2);
  $('#stats').appendChild(document.createTextNode(' concerts'));
  if (conflicts > 0) {
    $('#stats').appendChild(document.createTextNode(' · '));
    const c = el('span', { style: { color: 'var(--warn)' } }, `${Math.round(conflicts)} conflit${conflicts>1?'s':''}`);
    $('#stats').appendChild(c);
  }
}

function renderViewTabs() {
  $$('.view-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.view === state.view);
    b.onclick = () => { state.view = b.dataset.view; render(); };
  });
}

function renderIdentity() {
  $('#identity-name').textContent = state.user.name;
  $('#identity-dot').style.color = state.user.color;
}

function concertCard(c, opts={}) {
  const conflicts = opts.conflicts || new Set();
  const selected = state.selected.has(c.id);
  const friendsHere = state.friends.filter(f => f.visible !== false && f.ids?.includes(c.id));
  const card = el('div', {
    class: 'concert' + (selected ? ' selected' : '') + (selected && conflicts.has(c.id) ? ' conflict' : ''),
    onClick: () => {
      if (selected) state.selected.delete(c.id); else state.selected.add(c.id);
      save(); render();
    }
  });
  card.appendChild(el('div', { class: 'time' },
    el('div', { class: 'start' }, c.s),
    el('div', {}, c.e)
  ));
  const middle = el('div', {});
  middle.appendChild(el('div', { class: 'name' }, c.n));
  const meta = [];
  if (c.g) meta.push(c.g);
  if (friendsHere.length) {
    meta.push(`${friendsHere.length} ami${friendsHere.length>1?'s':''}`);
  }
  if (meta.length) middle.appendChild(el('div', { class: 'genre' }, meta.join(' · ')));
  card.appendChild(middle);

  const right = el('div', { class: 'marks' });
  const info = INFO[c.n];
  if (info) {
    right.appendChild(el('button', {
      class: 'info-btn',
      title: 'Infos groupe',
      onClick: (e) => { e.stopPropagation(); showInfo(c, info); }
    }, 'i'));
  }
  for (const f of friendsHere) {
    right.appendChild(el('span', { class: 'mark', style: { background: f.color }, title: f.name }));
  }
  const check = el('div', { class: 'check', html: ICON_CHECK });
  right.appendChild(check);
  card.appendChild(right);
  return card;
}

function renderLineup() {
  const root = $('#content');
  root.innerHTML = '';
  const day = state.day;
  const stagesInDay = STAGES.filter(s => CONCERTS.some(c => c.d === day && c.st === s.id));
  const conflicts = conflictsFor(state.selected);
  for (const stage of stagesInDay) {
    const group = el('div', { class: 'stage-group' });
    const header = el('div', { class: 'stage-header' });
    header.appendChild(el('span', { class: 'stripe', style: { background: stage.color } }));
    header.appendChild(el('span', { class: 'name' }, stage.label));
    header.appendChild(el('span', { class: 'zone' }, stage.zone === 'main' ? 'HELLFEST' : 'HELLCITY'));
    group.appendChild(header);
    const concerts = CONCERTS.filter(c => c.d === day && c.st === stage.id)
      .sort((a,b) => toMin(a.s) - toMin(b.s));
    for (const c of concerts) {
      group.appendChild(concertCard(c, { conflicts }));
    }
    root.appendChild(group);
  }
}

function renderPlanning() {
  const root = $('#content');
  root.innerHTML = '';
  const day = state.day;
  const conflicts = conflictsFor(state.selected);
  const mine = CONCERTS.filter(c => c.d === day && state.selected.has(c.id))
    .sort((a,b) => toMin(a.s) - toMin(b.s));
  if (mine.length === 0) {
    root.appendChild(el('div', { class: 'planning-empty' },
      el('div', { class: 'big' }, 'RIEN.'),
      el('div', {}, 'Tape "LINEUP" et choisis tes concerts.')
    ));
    return;
  }
  const group = el('div', { class: 'stage-group' });
  for (const c of mine) {
    const card = concertCard(c, { conflicts });
    // override left stripe with stage color hint
    const stage = stageById[c.st];
    const badge = el('div', { class: 'genre' }, stage.label);
    // inject stage label into card
    const middle = card.children[1];
    if (!card.querySelector('.genre')) middle.appendChild(badge);
    group.appendChild(card);
  }
  root.appendChild(group);
}

function renderGroup() {
  const root = $('#content');
  root.innerHTML = '';
  const day = state.day;
  // Build a "people" list: me + visible friends
  const people = [
    { name: state.user.name, color: state.user.color, ids: [...state.selected] },
    ...state.friends.filter(f => f.visible !== false)
  ];

  // For each visible person, list concerts they go to on this day
  // Group by time slot (start time bucket)
  const slots = {}; // key: start min, value: { time, items: [{ concert, person }] }
  for (const p of people) {
    for (const id of (p.ids || [])) {
      const c = concertById[id];
      if (!c || c.d !== day) continue;
      const key = toMin(c.s);
      if (!slots[key]) slots[key] = { time: c.s, items: [] };
      slots[key].items.push({ concert: c, person: p });
    }
  }
  const sortedKeys = Object.keys(slots).map(Number).sort((a,b) => a-b);
  if (sortedKeys.length === 0) {
    root.appendChild(el('div', { class: 'planning-empty' },
      el('div', { class: 'big' }, 'VIDE.'),
      el('div', {}, 'Personne (toi inclus) n\'a sélectionné de concert pour ce jour.')
    ));
    return;
  }
  for (const k of sortedKeys) {
    const slot = slots[k];
    // Group items by concert
    const byConcert = {};
    for (const item of slot.items) {
      const cid = item.concert.id;
      if (!byConcert[cid]) byConcert[cid] = { concert: item.concert, people: [] };
      byConcert[cid].people.push(item.person);
    }
    const slotEl = el('div', { class: 'group-slot' });
    slotEl.appendChild(el('div', { class: 'slot-time' }, slot.time));
    for (const cid in byConcert) {
      const { concert, people } = byConcert[cid];
      const stage = stageById[concert.st];
      const row = el('div', { class: 'slot-row' });
      row.appendChild(el('div', { class: 'stage-stripe', style: { background: stage.color } }));
      const info = el('div', { class: 'info' });
      info.appendChild(el('div', { class: 'concert-name' }, concert.n));
      info.appendChild(el('div', { class: 'concert-meta' }, `${stage.label} · ${concert.s} → ${concert.e}`));
      row.appendChild(info);
      const avatars = el('div', { class: 'avatars' });
      for (const p of people) {
        avatars.appendChild(el('div', { class: 'avatar', style: { background: p.color }, title: p.name }, p.name.charAt(0)));
      }
      row.appendChild(avatars);
      slotEl.appendChild(row);
    }
    root.appendChild(slotEl);
  }
}

function render() {
  renderIdentity();
  renderDays();
  renderViewTabs();
  renderStats();
  if (state.view === 'lineup') renderLineup();
  else if (state.view === 'planning') renderPlanning();
  else if (state.view === 'group') renderGroup();
}

// ---------- Modals ----------
function showModal(title, body) {
  closeModal();
  const back = el('div', { class: 'modal-back', onClick: (e) => { if (e.target === back) closeModal(); } });
  const modal = el('div', { class: 'modal' });
  const head = el('div', { class: 'modal-head' });
  head.appendChild(el('h2', {}, title));
  head.appendChild(el('button', { class: 'modal-close', onClick: closeModal }, '✕'));
  modal.appendChild(head);
  const bodyEl = el('div', { class: 'modal-body' });
  if (typeof body === 'string') bodyEl.innerHTML = body;
  else if (Array.isArray(body)) body.forEach(c => bodyEl.appendChild(c));
  else bodyEl.appendChild(body);
  modal.appendChild(bodyEl);
  back.appendChild(modal);
  $('#modal-root').appendChild(back);
}
function closeModal() {
  $('#modal-root').innerHTML = '';
}

function showInfo(c, info) {
  const stage = stageById[c.st];
  const body = [];
  const metaBits = [c.g, stage?.label, `${c.s} → ${c.e}`].filter(Boolean);
  body.push(el('div', { class: 'info-genre' }, metaBits.join(' · ')));
  if (info.sp) {
    body.push(el('a', {
      class: 'info-spotify', href: info.sp, target: '_blank', rel: 'noopener'
    }, '♪ Écouter sur Spotify'));
  } else {
    body.push(el('div', { class: 'info-spotify-none' }, 'Spotify : introuvable'));
  }
  body.push(el('div', { class: 'info-bio' }, info.bio));
  showModal(c.n, body);
}

function openIdentity() {
  const nameInput = el('input', { type: 'text', value: state.user.name, maxlength: 12 });
  const picker = el('div', { class: 'color-picker' });
  let chosenColor = state.user.color;
  for (const c of COLORS) {
    const sw = el('div', {
      class: 'color-swatch' + (c === chosenColor ? ' active' : ''),
      style: { background: c },
      onClick: () => {
        chosenColor = c;
        $$('.color-swatch', picker).forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
      }
    });
    picker.appendChild(sw);
  }
  showModal('IDENTITÉ', [
    el('p', {}, 'Ton pseudo et ta couleur. Visibles par tes amis quand tu partages ton planning.'),
    el('label', {}, 'Pseudo'),
    nameInput,
    el('label', {}, 'Couleur'),
    picker,
    el('div', { class: 'btn-row' },
      el('button', {
        class: 'btn primary',
        onClick: () => {
          state.user.name = nameInput.value.trim() || 'MOI';
          state.user.color = chosenColor;
          save();
          closeModal();
          render();
          toast('Identité enregistrée');
        }
      }, 'OK')
    )
  ]);
}

// Public app URL — scanning the QR opens this and auto-imports via ?d=
const SHARE_BASE = 'https://pushreset.github.io/hellfest-running-order-2026/';

// UTF-8 safe base64url (handles accents in names)
function b64urlEncode(str) {
  return btoa(unescape(encodeURIComponent(str)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64urlDecode(b64) {
  return decodeURIComponent(escape(atob(b64.replace(/-/g,'+').replace(/_/g,'/'))));
}

function buildPayload() {
  return {
    v: 1,
    t: 'sched',
    n: state.user.name,
    c: state.user.color,
    ids: [...state.selected]
  };
}

function openQR() {
  const payload = buildPayload();
  const payloadStr = JSON.stringify(payload);
  const shareUrl = SHARE_BASE + '?d=' + b64urlEncode(payloadStr);
  // Generate QR — encodes the public app URL so any phone camera works
  const qr = qrcode(0, 'M');
  qr.addData(shareUrl);
  qr.make();
  const svgStr = qr.createSvgTag({ cellSize: 6, margin: 0, scalable: true });

  const qrBox = el('div', { class: 'qr-box', html: svgStr });

  showModal('MON QR', [
    el('p', {}, `Partage ton planning : tes potes scannent ce code avec l'appareil photo, le site s'ouvre et importe ${payload.ids.length} concert${payload.ids.length>1?'s':''}.`),
    qrBox,
    el('label', {}, 'Ou copie-colle ce lien (à ouvrir dans un navigateur)'),
    el('div', { class: 'qr-payload' }, shareUrl),
    el('div', { class: 'btn-row' },
      el('button', {
        class: 'btn',
        onClick: () => {
          navigator.clipboard?.writeText(shareUrl);
          toast('Copié');
        }
      }, 'Copier le lien'),
      el('button', { class: 'btn ghost', onClick: closeModal }, 'Fermer')
    )
  ]);
}

// Import the payload as a friend's schedule (shown in GROUPE view)
function importAsFriend(payload, validIds, dropped) {
  const idx = state.friends.findIndex(f => f.name.toLowerCase() === payload.n.toLowerCase());
  const friend = {
    id: payload.n + '-' + Date.now(),
    name: payload.n,
    color: payload.c || '#888',
    ids: validIds,
    visible: true,
    updated: Date.now()
  };
  if (idx >= 0) { friend.id = state.friends[idx].id; state.friends[idx] = friend; }
  else state.friends.push(friend);
  save();
  render();
  toast(`${payload.n} importé · ${validIds.length} concerts${dropped?' · '+dropped+' inconnus':''}`);
}

// Import the payload as MY OWN setlist — transfer from another device.
// mode 'replace' overwrites my selection, 'merge' adds to it.
function importToMine(payload, validIds, mode, dropped) {
  if (mode === 'replace') state.selected = new Set(validIds);
  else for (const id of validIds) state.selected.add(id);
  save();
  render();
  const verb = mode === 'replace' ? 'remplacée' : 'mise à jour';
  toast(`Setlist ${verb} · ${state.selected.size} concerts${dropped?' · '+dropped+' inconnus':''}`);
}

function handlePayload(str) {
  str = (str || '').trim();
  // Accept a full share URL (or any ?d= link), not only raw JSON
  if (/^https?:\/\//i.test(str) || /[?&]d=/.test(str)) {
    try {
      const u = new URL(str, location.href);
      const d = u.searchParams.get('d');
      if (d) str = b64urlDecode(d);
    } catch { /* fall through, try as JSON */ }
  }
  let payload;
  try { payload = JSON.parse(str); }
  catch { toast('Format invalide'); return; }
  if (payload.t !== 'sched' || !payload.n) { toast('Format inconnu'); return; }

  // Validate concert IDs
  const validIds = (payload.ids || []).filter(id => concertById[id]);
  const dropped = (payload.ids || []).length - validIds.length;

  // Ask: is this a friend's planning, or a transfer of MY own setlist?
  showModal('IMPORTER', [
    el('p', {}, `Planning de « ${payload.n} » — ${validIds.length} concert${validIds.length>1?'s':''}${dropped?' · '+dropped+' inconnu'+(dropped>1?'s':'')+' ignoré'+(dropped>1?'s':''):''}.`),
    el('label', {}, 'Importer comme'),
    el('p', {}, 'AMI : son planning s\'ajoute à côté du tien (vue GROUPE). MA SETLIST : c\'est un transfert de TON propre planning depuis un autre appareil.'),
    el('div', { class: 'btn-row', style: { flexWrap: 'wrap' } },
      el('button', { class: 'btn', onClick: () => { closeModal(); importAsFriend(payload, validIds, dropped); } }, `Ami : ${payload.n}`),
      el('button', { class: 'btn primary', onClick: () => { closeModal(); importToMine(payload, validIds, 'merge', dropped); } }, 'Ma setlist — Ajouter'),
      el('button', {
        class: 'btn',
        onClick: () => {
          if (state.selected.size && !confirm(`Écraser ta setlist actuelle (${state.selected.size} concert${state.selected.size>1?'s':''}) ?`)) return;
          closeModal();
          importToMine(payload, validIds, 'replace', dropped);
        }
      }, 'Ma setlist — Écraser')
    ),
    el('div', { class: 'btn-row' },
      el('button', { class: 'btn ghost', onClick: closeModal }, 'Annuler')
    )
  ]);
}

function openFriends() {
  const body = [];
  body.push(el('p', {}, `${state.friends.length} ami${state.friends.length>1?'s':''}. Désactive la visibilité pour les masquer du planning groupe.`));
  if (state.friends.length === 0) {
    body.push(el('div', { class: 'empty-state' },
      el('div', { class: 'big' }, 'SEUL.'),
      el('div', {}, 'Ouvre le lien QR d\'un pote pour l\'ajouter.')
    ));
  }
  for (const f of state.friends) {
    const row = el('div', { class: 'friend-row' });
    row.appendChild(el('div', { class: 'friend-avatar', style: { background: f.color } }, f.name.charAt(0)));
    const info = el('div', { class: 'friend-info' });
    info.appendChild(el('div', { class: 'n' }, f.name));
    info.appendChild(el('div', { class: 'm' }, `${(f.ids||[]).length} concerts`));
    row.appendChild(info);
    const tog = el('button', {
      class: 'friend-toggle' + (f.visible !== false ? ' on' : ''),
      onClick: () => {
        f.visible = !(f.visible !== false);
        save();
        openFriends(); render();
      }
    });
    row.appendChild(tog);
    row.appendChild(el('button', {
      class: 'btn ghost', style: { padding: '4px 8px', marginLeft: '8px', fontSize: '10px' },
      onClick: () => {
        if (confirm(`Supprimer ${f.name} ?`)) {
          state.friends = state.friends.filter(x => x.id !== f.id);
          save(); openFriends(); render();
        }
      }
    }, '✕'));
    body.push(row);
  }
  body.push(el('div', { class: 'btn-row' },
    el('button', { class: 'btn ghost', onClick: closeModal }, 'Fermer')
  ));
  showModal('AMIS', body);
}

// ---------- Wire up ----------
$('#identity-btn').onclick = openIdentity;
$('#btn-qr').onclick = openQR;
$('#btn-friends').onclick = openFriends;

// First-launch identity
if (!localStorage.getItem('hf_user')) {
  setTimeout(openIdentity, 300);
}

// URL import: open page with ?d=<base64-json> to auto-import
(function urlImport() {
  const params = new URLSearchParams(location.search);
  const d = params.get('d');
  if (!d) return;
  try {
    const decoded = b64urlDecode(d);
    handlePayload(decoded);
    history.replaceState({}, '', location.pathname);
  } catch (e) { console.warn('URL import failed', e); }
})();

render();
</script>
